<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototype Center | 原型演示系统</title>
    <link rel="stylesheet" href="style.css?v=1.0.1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="app-header">
            <div class="header-content">
                <a href="/" class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z"/>
                        <path d="M2 17L12 22L22 17"/>
                        <path d="M2 12L12 17L22 12"/>
                    </svg>
                    <span class="logo-text">Prototype Center</span>
                </a>
                
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索项目或原型..." />
                        <span class="search-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </span>
                    </div>
                    
                    <!-- 联合新建按钮 -->
                    <div class="dropdown">
                        <button class="btn-primary" id="newBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            新建原型
                        </button>
                        <div class="dropdown-menu">
                            <div class="dropdown-menu-inner">
                                <a href="#" id="menuItemGit">
                                    <svg viewBox="0 0 23 23" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.778-7.778zM12 2v4M10 22h4"/></svg>
                                    Git 同步
                                </a>
                                <a href="#" id="menuItemUpload">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                                    文件夹上传
                                </a>
                                <a href="#" id="menuItemLink">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                                    外部链接映射
                                </a>
                            </div>
                        </div>
                    </div>

                    <button class="btn-icon" id="refreshBtn" title="刷新">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- 主内容区：双栏布局 -->
        <div class="main-content">
            <!-- 左侧树形导航 -->
            <aside class="sidebar">
                <div class="sidebar-nav-header">目录导航</div>
                <div class="sidebar-home-item" id="sidebarHome" onclick="goHome()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 0 0 1 1h3m10-11l2 2m-2-2v10a1 1 0 0 1-1 1h-3m-6 0a1 1 0 0 0 1-1v-4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v4a1 1 0 0 0 1 1m-6 0h6"></path></svg>
                    <span>首页</span>
                </div>
                <div class="loading" id="loading" style="display:none">
                    <div class="spinner"></div>
                    <p>正在生成树形结构...</p>
                </div>
                <div class="tree-container" id="treeContainer">
                    <!-- 树形导航将由 script.js 自动生成 -->
                </div>
            </aside>

            <!-- 右侧详情区 -->
            <main class="content-area">
                <div class="content-header">
                    <h2 id="contentTitle">请选择项目</h2>
                </div>
                <div id="contentBody">
                    <div class="empty-state">
                        <p>👈 请从左侧导航栏选择一个项目查看详情</p>
                    </div>
                </div>
            </main>
        </div>
        
        <!-- 错误提示 -->
        <div class="error" id="error" style="display: none;">
            <p>❌ 服务端响应错误，请检查网络或后端状态</p>
        </div>

        <!-- 自定义模拟弹窗 (Modal) -->
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal-box">
                <div class="modal-header">
                    <h3 id="modalTitle">提示</h3>
                    <button class="modal-close-icon" id="modalClose">&times;</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- 动态内容 -->
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="modalCancel">取消</button>
                    <button class="btn-primary" id="modalConfirm">确定</button>
                </div>
            </div>
        </div>

        <!-- 子弹窗：Monorepo 子项目内「编辑」时使用，不关闭底层子项目列表 -->
        <div class="modal-overlay modal-overlay-nested" id="modalOverlayNested">
            <div class="modal-box">
                <div class="modal-header">
                    <h3 id="modalTitleNested">提示</h3>
                    <button type="button" class="modal-close-icon" id="modalCloseNested">&times;</button>
                </div>
                <div class="modal-body" id="modalBodyNested"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary" id="modalCancelNested">取消</button>
                    <button type="button" class="btn-primary" id="modalConfirmNested">确定</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js?v=1.0.5"></script>
</body>
</html>
